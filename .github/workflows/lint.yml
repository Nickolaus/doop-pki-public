name: lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.x"
      - name: Shell syntax
        run: |
          bash -n linux/install-root-ca-debian.sh
          bash -n linux/install-root-ca-redhat.sh
      - name: PowerShell syntax
        shell: pwsh
        run: |
          $null = [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path 'windows/install-root-ca.ps1'), [ref]$null, [ref]$null)
      - name: Markdown link checks
        run: python3 scripts/checks/check_markdown_links.py
