name: public-scope-guard

on:
  push:
  pull_request:

jobs:
  public-scope-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.x"
      - name: Run public scope guard
        run: python3 scripts/policy/public_scope_guard.py
