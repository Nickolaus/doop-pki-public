name: public-scope-guard

on:
  push:
  pull_request:

jobs:
  public-scope-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.x"
      - name: Run public scope guard
        run: python3 scripts/policy/public_scope_guard.py
